<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI 数之助 ～KaZnoSKE～</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#007ACC" />
  
  <!-- 🎌 日本語フォントの読み込み -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  
  <script src="js/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  
  <style>
    /* 🎌 全体のフォント設定 */
    * {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', sans-serif;
    }
    
    /* 🎴 タイトル用の和風フォント */
    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      color: #1a3a52;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>AI 数之助 ～KaZnoSKE～</h1>

  <div class="select-area">
    <label for="modelSelect">⚙️ 部品名選択：</label>
    <select id="modelSelect"></select>
  </div>

  <div class="slider-container" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 4px; width: 100%;">
    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9rem;">
      <label for="confSlider">🔍 検出感度（閾値）調整：</label>
      <span id="sliderValue">0.10</span>
    </div>
    <input type="range" id="confSlider" min="0.05" max="0.90" step="0.05" value="0.10" style="width: 100%; height: 30px; cursor: pointer;" />
  </div>

  <div class="upload-area">
    <div class="file-input-wrapper">
      <div class="custom-file-btn">📁 画像を選ぶ</div>
      <input type="file" id="imageInput" accept="image/*" />
    </div>
    <button id="startCameraBtn">📸 カメラ起動</button>
    <button id="captureBtn" disabled>🎯 写真を撮る</button>
    <button id="runBtn" disabled>🚀 カウント開始</button>
  </div>

  <div id="result"></div>

  <video id="video" autoplay playsinline style="display: none; width: 100%; max-width: 640px; background: #000; margin-bottom: 12px;"></video>

  <canvas id="canvas"></canvas>

  <script src="js/app.js"></script>
</body>
</html>
